# 應用程式 Service
# ClusterIP 類型：僅供 cluster 內部存取，由 Ingress 對外暴露
apiVersion: v1
kind: Service
metadata:
  name: asiayo-svc
  namespace: asiayo
  labels:
    app: asiayo-app
spec:
  type: ClusterIP
  selector:
    app: asiayo-app
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
