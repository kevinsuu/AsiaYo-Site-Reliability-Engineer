# HPA：CPU 70% 或 Memory 80% 時擴容，縮容故意設慢避免震盪
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asiayo-app-hpa
  namespace: asiayo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asiayo-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
