# ServiceAccount：讓 App Pod 透過 IRSA 存取 S3
# annotation 的 role-arn 由 Terraform outputs 取得，填入實際 ARN
apiVersion: v1
kind: ServiceAccount
metadata:
  name: asiayo-app-sa
  namespace: asiayo
  annotations:
    # Terraform output: module.app_s3_irsa.iam_role_arn
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/asiayo-eks-app-s3
